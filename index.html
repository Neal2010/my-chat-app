<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groepschat Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg0: #0d0f14; --bg1: #13161d; --bg2: #1a1e28; --bg3: #222736;
    --border: #2a2f3e; --border2: #343a4d;
    --text1: #e8eaf2; --text2: #9198b0; --text3: #5c6280;
    --accent: #4f7fff; --accent-dim: #1e2e5a; --accent-glow: rgba(79,127,255,0.18);
    --green: #3ecf8e; --danger: #ff5c5c; --warning: #ffa500;
    --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    --r: 10px; --rsm: 6px; --rlg: 14px; --rxl: 18px;
  }

  body.light-mode {
    --bg0: #f5f5f5; --bg1: #ffffff; --bg2: #f0f0f0; --bg3: #e8e8e8;
    --border: #d0d0d0; --border2: #c0c0c0;
    --text1: #1a1a1a; --text2: #555555; --text3: #888888;
    --accent: #2563eb;
  }

  html, body { height: 100%; background: var(--bg0); font-family: var(--font); color: var(--text1); transition: all 0.3s; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }

  .app { display: flex; width: 100%; max-width: 1200px; height: 680px; background: var(--bg1); border: 1px solid var(--border); border-radius: var(--rxl); overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.6); position: relative; }

  .sidebar { width: 250px; min-width: 250px; background: var(--bg0); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-top { padding: 14px; border-bottom: 1px solid var(--border); }
  .sidebar-logo { font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .sidebar-logo::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .sidebar-btns { display: flex; gap: 6px; margin-bottom: 8px; }
  .new-btn { flex: 1; padding: 8px 12px; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(79,127,255,0.25); border-radius: var(--rsm); font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .new-btn:hover { background: rgba(79,127,255,0.25); }
  .theme-btn { width: 36px; height: 36px; padding: 0; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--rsm); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .theme-btn:hover { background: var(--bg3); }
  .groups-list { flex: 1; overflow-y: auto; padding: 8px; }
  .groups-list::-webkit-scrollbar { width: 3px; }
  .groups-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .group-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--rsm); cursor: pointer; margin-bottom: 2px; transition: background 0.12s; border: 1px solid transparent; position: relative; }
  .group-item:hover { background: var(--bg2); }
  .group-item.active { background: var(--bg2); border-color: var(--border2); }
  .g-avatar { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .g-info { flex: 1; min-width: 0; }
  .g-name { font-size: 13px; font-weight: 500; color: var(--text1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .g-prev { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .fav-star { font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .user-footer { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; cursor: pointer; transition: background 0.12s; }
  .user-footer:hover { background: var(--bg2); }
  .credit { padding: 8px 14px; font-size: 11px; color: var(--text3); font-family: var(--mono); border-top: 1px solid var(--border); text-align: center; letter-spacing: 0.03em; }
  .user-dot { width: 30px; height: 30px; border-radius: 8px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text2); flex-shrink: 0; }
  .user-name { font-size: 13px; color: var(--text2); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg1); }
  .chat-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; justify-content: space-between; }
  .chat-header-left { display: flex; align-items: center; gap: 12px; flex: 1; }
  .chat-avatar { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; flex-shrink: 0; }
  .chat-meta { flex: 1; }
  .chat-meta h2 { font-size: 15px; font-weight: 600; color: var(--text1); }
  .chat-meta p { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .chat-header-btns { display: flex; gap: 8px; align-items: center; }
  .icon-btn { padding: 7px 12px; background: transparent; border: 1px solid var(--border2); color: var(--text2); border-radius: var(--rsm); font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  .messages-area { flex: 1; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 14px; }
  .messages-area::-webkit-scrollbar { width: 3px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  
  .msg-row { display: flex; gap: 10px; align-items: flex-end; position: relative; }
  .msg-row:hover .msg-actions { opacity: 1; }
  .msg-row.own { flex-direction: row-reverse; }
  .msg-av { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .msg-body { max-width: 65%; }
  .msg-sender { font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
  .msg-row.own .msg-sender { text-align: right; }
  .msg-bubble { display: inline-block; padding: 9px 14px; border-radius: 14px 14px 14px 4px; font-size: 14px; line-height: 1.55; background: var(--bg3); color: var(--text1); border: 1px solid var(--border); word-break: break-word; max-width: 100%; }
  .msg-row.own .msg-bubble { background: var(--accent-dim); border-color: rgba(79,127,255,0.3); color: #c8d8ff; border-radius: 14px 14px 4px 14px; }
  .msg-bubble.reply-bubble { border-left: 3px solid var(--accent); padding-left: 10px; }
  .msg-reply { font-size: 12px; color: var(--text2); margin-bottom: 6px; padding: 6px; background: rgba(79,127,255,0.1); border-radius: 6px; }
  .msg-img { max-width: 260px; max-height: 200px; border-radius: 10px; display: block; cursor: pointer; border: 1px solid var(--border2); transition: opacity 0.15s; }
  .msg-img:hover { opacity: 0.85; }
  .msg-time { font-size: 10px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }
  .msg-row.own .msg-time { text-align: right; }
  .msg-actions { opacity: 0; display: flex; gap: 4px; margin-top: 4px; transition: opacity 0.2s; }
  .msg-action-btn { font-size: 18px; cursor: pointer; transition: transform 0.15s; }
  .msg-action-btn:hover { transform: scale(1.2); }
  .msg-reactions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .reaction { display: inline-flex; align-items: center; gap: 2px; padding: 2px 6px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .reaction:hover { background: var(--bg3); }
  .reaction.active { background: var(--accent-dim); border-color: var(--accent); }
  .sys-msg { text-align: center; font-size: 12px; color: var(--text3); padding: 6px; }
  .typing-indicator { font-size: 12px; color: var(--text3); font-style: italic; padding: 4px 0; }

  .img-preview-bar { padding: 8px 14px 0; display: flex; align-items: flex-end; gap: 8px; }
  .img-preview-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border2); }
  .img-preview-remove { background: var(--danger); border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 15px; line-height: 1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .input-wrap { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
  .msg-input { flex: 1; padding: 10px 14px; font-family: var(--font); font-size: 14px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r); color: var(--text1); outline: none; resize: none; max-height: 120px; line-height: 1.45; transition: border-color 0.15s; }
  .msg-input::placeholder { color: var(--text3); }
  .msg-input:focus { border-color: var(--accent); }
  .img-btn { width: 40px; height: 40px; border-radius: var(--r); background: var(--bg2); border: 1px solid var(--border2); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; color: var(--text3); font-size: 16px; }
  .img-btn:hover { border-color: var(--accent); color: var(--accent); }
  .send-btn { width: 40px; height: 40px; border-radius: var(--r); background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .send-btn:hover { background: #6b8fff; }
  .send-btn:active { transform: scale(0.95); }
  .emoji-picker-container { position: relative; }
  .emoji-picker { position: absolute; bottom: 50px; left: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 8px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; z-index: 100; }
  .emoji-btn { width: 32px; height: 32px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .emoji-btn:hover { background: var(--bg3); transform: scale(1.1); }

  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; align-items: center; justify-content: center; z-index: 999; cursor: zoom-out; }
  .lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 10px; box-shadow: 0 24px 80px rgba(0,0,0,0.8); }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .empty-icon { font-size: 42px; }
  .empty-state p { font-size: 14px; color: var(--text2); }
  .empty-btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: var(--rsm); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: all 0.15s; }
  .empty-btn:hover { background: #6b8fff; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 500; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--rlg); padding: 24px; width: 90%; max-width: 400px; box-shadow: 0 16px 48px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 600; color: var(--text1); margin-bottom: 16px; }
  .modal label { display: block; font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .modal-input { width: 100%; padding: 10px 13px; font-family: var(--font); font-size: 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--rsm); color: var(--text1); outline: none; margin-bottom: 14px; transition: border-color 0.15s; }
  .modal-input::placeholder { color: var(--text3); }
  .modal-input:focus { border-color: var(--accent); }
  .modal-textarea { width: 100%; padding: 10px 13px; font-family: var(--font); font-size: 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--rsm); color: var(--text1); outline: none; margin-bottom: 14px; resize: vertical; min-height: 80px; }
  .modal-textarea:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel { padding: 8px 16px; background: transparent; border: 1px solid var(--border2); color: var(--text2); border-radius: var(--rsm); font-family: var(--font); font-size: 13px; cursor: pointer; }
  .btn-cancel:hover { color: var(--text1); }
  .btn-confirm { padding: 8px 18px; background: var(--accent); border: none; color: white; border-radius: var(--rsm); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-confirm:hover { background: #6b8fff; }
  .btn-danger { background: var(--danger); }
  .btn-danger:hover { background: #ff7070; }

  .members-panel { position: fixed; right: 0; top: 0; width: 280px; height: 100vh; background: var(--bg1); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform 0.3s; z-index: 300; display: flex; flex-direction: column; }
  .members-panel.open { transform: translateX(0); }
  .members-header { padding: 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .members-list { flex: 1; overflow-y: auto; padding: 8px; }
  .member-item { padding: 10px; border-radius: var(--rsm); margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; background: var(--bg2); }
  .member-name { font-size: 13px; font-weight: 500; color: var(--text1); }
  .member-badge { font-size: 10px; background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; }
  .member-actions { display: flex; gap: 4px; }
  .member-action-btn { padding: 4px 8px; font-size: 11px; background: var(--danger); color: white; border: none; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .member-action-btn:hover { background: #ff7070; }

  @media (max-width: 768px) {
    .app { height: auto; min-height: 100vh; flex-direction: column; }
    .sidebar { width: 100%; min-width: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .main { height: 500px; }
    .members-panel { width: 100%; right: auto; left: 0; height: auto; max-height: 200px; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">Groepschat Pro</div>
      <div class="sidebar-btns">
        <button class="new-btn" id="newGroupBtn" title="Nieuwe groep">+ Groep</button>
        <button class="new-btn" id="joinGroupBtn" title="Groep joinen">🔗 Join</button>
        <button class="theme-btn" id="themeBtn" title="Thema's">🌙</button>
      </div>
    </div>
    <div class="groups-list" id="groupsList">
      <div style="padding:14px;font-size:13px;color:#5c6280;text-align:center;">Laden...</div>
    </div>
    <div class="credit">Neal Cordonnier</div>
    <div class="user-footer" id="userFooter">
      <div class="user-dot" id="userDot">?</div>
      <div class="user-name" id="userNameDisplay">Klik om naam in te stellen</div>
    </div>
  </div>

  <div class="main" id="mainArea">
    <div class="empty-state">
      <div class="empty-icon">💬</div>
      <p>Selecteer een groep of maak een nieuwe</p>
      <button class="empty-btn" id="emptyBtn">Maak je eerste groep</button>
    </div>
  </div>

  <div class="members-panel" id="membersPanel">
    <div class="members-header">
      <h3 style="font-size: 14px;">Deelnemers</h3>
      <button id="closeMembersBtn" style="background: none; border: none; color: var(--text2); cursor: pointer; font-size: 18px;">×</button>
    </div>
    <div class="members-list" id="membersList"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wpxgorlbeiudbysdbzmw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_u4bHqDJSAPUuuUokFKcwtA_1cq-r52n';
const { createClient } = window.supabase;
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const EMOJIS = ['😀', '😂', '❤️', '👍', '🎉', '🔥', '😍', '🤔', '👏', '💯'];
const THEMES = [
  { name: 'Dark', colors: { bg0: '#0d0f14', bg1: '#13161d', bg2: '#1a1e28', bg3: '#222736', text1: '#e8eaf2', accent: '#4f7fff' } },
  { name: 'Light', colors: { bg0: '#f5f5f5', bg1: '#ffffff', bg2: '#f0f0f0', bg3: '#e8e8e8', text1: '#1a1a1a', accent: '#2563eb' } },
  { name: 'Purple', colors: { bg0: '#1a0f2e', bg1: '#2d1b4e', bg2: '#3d2b6e', bg3: '#4d3b8e', text1: '#e8eaf2', accent: '#b77edb' } },
  { name: 'Ocean', colors: { bg0: '#0a1628', bg1: '#0f2847', bg2: '#1a3a5f', bg3: '#2a4a7f', text1: '#e0f7ff', accent: '#00d4ff' } },
];

let me = localStorage.getItem('chat_un') || null;
let currentGid = null;
let currentGroup = null;
let currentUserId = localStorage.getItem('user_id') || null;
let groups = [];
let messages = [];
let members = [];
let replyingTo = null;
let subscription = null;
let typingTimeout = null;
let lastMessageTime = 0;

if (!currentUserId) {
  currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  localStorage.setItem('user_id', currentUserId);
}

function updateFooter() {
  document.getElementById('userDot').textContent = me ? me[0].toUpperCase() : '?';
  document.getElementById('userNameDisplay').textContent = me || 'Klik om naam in te stellen';
}

function openModal(html) {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = '<div class="modal">' + html + '</div>';
  ov.addEventListener('click', function(e) { if(e.target === ov) ov.remove(); });
  document.body.appendChild(ov);
  return ov;
}

function askUsername(cb) {
  const ov = openModal(
    '<h3>Welkom 👋</h3>' +
    '<label>Jouw gebruikersnaam</label>' +
    '<input class="modal-input" id="unInp" type="text" placeholder="bv. Jan, Emma..." maxlength="24" autocomplete="off">' +
    '<div class="modal-btns"><button class="btn-confirm" id="unOk">Starten</button></div>'
  );
  const inp = ov.querySelector('#unInp');
  function go() {
    const v = inp.value.trim();
    if (!v) { inp.style.borderColor = '#ff5c5c'; inp.focus(); return; }
    me = v; localStorage.setItem('chat_un', v);
    ov.remove(); updateFooter(); if(cb) cb();
  }
  ov.querySelector('#unOk').addEventListener('click', go);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') go(); });
  setTimeout(function(){ inp.focus(); }, 60);
}

function ensureUser(cb) { if(me) cb(); else askUsername(cb); }

function showNewGroup() {
  ensureUser(function() {
    const ov = openModal(
      '<h3>Nieuwe groep aanmaken</h3>' +
      '<label>Groepsnaam</label>' +
      '<input class="modal-input" id="gnInp" type="text" placeholder="bv. Vrienden, Familie..." maxlength="32">' +
      '<label>Beschrijving (optioneel)</label>' +
      '<textarea class="modal-textarea" id="gdInp" placeholder="Wat is deze groep voor?"></textarea>' +
      '<div class="modal-btns">' +
        '<button class="btn-cancel" id="gnCancel">Annuleren</button>' +
        '<button class="btn-confirm" id="gnOk">Aanmaken</button>' +
      '</div>'
    );
    const nameInp = ov.querySelector('#gnInp');
    const descInp = ov.querySelector('#gdInp');
    function go() {
      const name = nameInp.value.trim();
      if (!name) { nameInp.style.borderColor = '#ff5c5c'; nameInp.focus(); return; }
      ov.remove();
      const id = 'grp_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
      const g = { id, name, description: descInp.value.trim(), created_at: new Date().toISOString(), creator_id: currentUserId, creator_name: me };
      supabase.from('groups').insert([g]).then(() => { loadGroups().then(() => { selectGroup(id); }); });
    }
    ov.querySelector('#gnOk').addEventListener('click', go);
    ov.querySelector('#gnCancel').addEventListener('click', function(){ ov.remove(); });
    nameInp.addEventListener('keydown', function(e){ if(e.key==='Enter') go(); });
    nameInp.focus();
  });
}

function showJoinGroup() {
  ensureUser(function() {
    const ov = openModal(
      '<h3>Groep joinen</h3>' +
      '<p style="font-size:13px;color:#9198b0;margin-bottom:10px;">Voer het groeps-ID in</p>' +
      '<input class="modal-input" id="joinInp" type="text" placeholder="grp_..." autocomplete="off">' +
      '<div class="error-hint" id="joinErr">Groep niet gevonden</div>' +
      '<div class="modal-btns"><button class="btn-cancel" id="joinClose">Annuleren</button><button class="btn-confirm" id="joinOk">Joinen</button></div>'
    );
    const inp = ov.querySelector('#joinInp');
    function go() {
      const id = inp.value.trim();
      if (!id) return;
      supabase.from('groups').select('*').eq('id', id).limit(1).then(({ data }) => {
        if (data && data.length) {
          ov.remove();
          supabase.from('group_members').insert([{ group_id: id, user_id: currentUserId, username: me }]).then(() => {
            loadGroups().then(() => { selectGroup(id); });
          });
        } else {
          document.getElementById('joinErr').style.display = 'block';
          inp.style.borderColor = '#ff5c5c';
        }
      });
    }
    ov.querySelector('#joinOk').addEventListener('click', go);
    ov.querySelector('#joinClose').addEventListener('click', function(){ ov.remove(); });
    inp.focus();
  });
}

async function loadGroups() {
  const { data } = await supabase.from('groups').select('*').order('created_at', { ascending: false });
  groups = data || [];
  renderSidebar();
}

function renderSidebar() {
  const el = document.getElementById('groupsList');
  if (!groups.length) {
    el.innerHTML = '<div style="padding:14px;font-size:13px;color:#5c6280;text-align:center;">Keine Groepen</div>';
    return;
  }
  let html = '';
  groups.forEach(function(g) {
    const c = palette(g.name);
    const isFav = localStorage.getItem('fav_' + g.id) === '1';
    html += '<div class="group-item' + (g.id===currentGid?' active':'') + '" data-gid="' + esc(g.id) + '">' +
      '<div class="g-avatar" style="background:' + c[0] + ';color:' + c[1] + '">' + esc(initials(g.name)) + '</div>' +
      '<div class="g-info">' +
        '<div class="g-name">' + esc(g.name) + '</div>' +
        '<div class="g-prev" id="prev_' + esc(g.id) + '">...</div>' +
      '</div>' +
      '<div class="fav-star" data-gid="' + esc(g.id) + '">' + (isFav ? '⭐' : '☆') + '</div>' +
    '</div>';
  });
  el.innerHTML = html;
  el.querySelectorAll('.group-item').forEach(function(item) {
    item.addEventListener('click', function(){ selectGroup(item.dataset.gid); });
  });
  el.querySelectorAll('.fav-star').forEach(function(star) {
    star.addEventListener('click', function(e) {
      e.stopPropagation();
      const gid = this.dataset.gid;
      const isFav = localStorage.getItem('fav_' + gid) === '1';
      if (isFav) localStorage.removeItem('fav_' + gid);
      else localStorage.setItem('fav_' + gid, '1');
      renderSidebar();
    });
  });
  groups.forEach(g => loadPreview(g.id));
}

async function loadPreview(gid) {
  const { data } = await supabase.from('messages').select('*').eq('group_id', gid).order('created_at', { ascending: false }).limit(1);
  const el = document.getElementById('prev_'+gid);
  if (!el || !data?.length) return;
  const last = data[0];
  el.textContent = last.image ? '📷 Foto' : (last.username + ': ' + (last.content||''));
}

async function selectGroup(gid) {
  ensureUser(async function() {
    currentGid = gid;
    if (subscription) subscription.unsubscribe();
    renderSidebar();
    currentGroup = groups.find(g => g.id === gid);
    if (!currentGroup) return;
    renderChat(currentGroup);
    await loadMessages();
    await loadMembers();
    subscription = supabase.channel('messages:' + gid)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'messages', filter: 'group_id=eq.' + gid }, () => { loadMessages(); })
      .subscribe();
  });
}

function renderChat(group) {
  const c = palette(group.name);
  const isAdmin = group.creator_id === currentUserId;
  const main = document.getElementById('mainArea');
  main.innerHTML =
    '<div class="chat-header">' +
      '<div class="chat-header-left">' +
        '<div class="chat-avatar" style="background:' + c[0] + ';color:' + c[1] + '">' + esc(initials(group.name)) + '</div>' +
        '<div class="chat-meta"><h2>' + esc(group.name) + '</h2><p id="memberInfo">...</p><p style="font-size:11px;color:#5c6280;margin-top:2px;">' + (group.description ? esc(group.description) : 'Keine Beschreibung') + '</p></div>' +
      '</div>' +
      '<div class="chat-header-btns">' +
        '<button class="icon-btn" id="membersBtn">👥 Deelnemers</button>' +
        (isAdmin ? '<button class="icon-btn" id="settingsBtn">⚙️ Instellingen</button>' : '') +
        '<button class="icon-btn" id="shareBtn">🔗 Deel</button>' +
      '</div>' +
    '</div>' +
    '<div id="imgPreviewBar"></div>' +
    '<div class="messages-area" id="msgsArea"></div>' +
    '<div id="typingIndicator" class="typing-indicator" style="display:none;"></div>' +
    '<div class="input-wrap">' +
      '<button class="img-btn" id="imgBtn">📷</button>' +
      '<input type="file" id="fileInp" accept="image/*" style="display:none">' +
      '<textarea class="msg-input" id="msgInp" rows="1" placeholder="Bericht..."></textarea>' +
      '<div class="emoji-picker-container">' +
        '<button class="img-btn" id="emojiBtn">😊</button>' +
        '<div class="emoji-picker" id="emojiPicker" style="display:none;"></div>' +
      '</div>' +
      '<button class="send-btn" id="sendBtn">📤</button>' +
    '</div>';

  const emojiPicker = document.getElementById('emojiPicker');
  EMOJIS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn';
    btn.textContent = emoji;
    btn.addEventListener('click', function() {
      document.getElementById('msgInp').value += emoji;
      emojiPicker.style.display = 'none';
    });
    emojiPicker.appendChild(btn);
  });

  document.getElementById('emojiBtn').addEventListener('click', function() {
    emojiPicker.style.display = emojiPicker.style.display === 'none' ? 'grid' : 'none';
  });

  document.getElementById('membersBtn').addEventListener('click', function() {
    document.getElementById('membersPanel').classList.toggle('open');
  });

  document.getElementById('closeMembersBtn').addEventListener('click', function() {
    document.getElementById('membersPanel').classList.remove('open');
  });

  if (isAdmin) {
    document.getElementById('settingsBtn').addEventListener('click', showGroupSettings);
  }

  document.getElementById('shareBtn').addEventListener('click', function(){ showShare(group); });
  document.getElementById('sendBtn').addEventListener('click', sendMsg);
  document.getElementById('imgBtn').addEventListener('click', function(){ document.getElementById('fileInp').click(); });
  document.getElementById('fileInp').addEventListener('change', function(e){ const f=e.target.files[0]; if(f) processImg(f); e.target.value=''; });

  const inp = document.getElementById('msgInp');
  inp.addEventListener('keydown', function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
    handleTyping();
  });
  inp.addEventListener('input', function(){ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,120)+'px'; });

  const area = document.getElementById('msgsArea');
  area.addEventListener('dragover', function(e){ e.preventDefault(); area.style.outline='2px dashed #4f7fff'; area.style.outlineOffset='-4px'; });
  area.addEventListener('dragleave', function(){ area.style.outline=''; });
  area.addEventListener('drop', function(e){ e.preventDefault(); area.style.outline=''; const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')) processImg(f); });

  document.addEventListener('paste', handlePaste);
  inp.focus();
}

function handleTyping() {
  supabase.from('typing_indicators').insert([{ group_id: currentGid, user_id: currentUserId, username: me }]).then(() => {
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      supabase.from('typing_indicators').delete().eq('user_id', currentUserId).eq('group_id', currentGid);
    }, 3000);
  });
}

async function loadMessages() {
  if (!currentGid) return;
  const { data } = await supabase.from('messages').select('*').eq('group_id', currentGid).order('created_at', { ascending: true });
  messages = data || [];
  renderMessages();
  const users = [...new Set(messages.map(m => m.username))];
  const el = document.getElementById('memberInfo');
  if (el) el.textContent = users.length ? users.length + ' deelnemers' : 'Wees de eerste!';
  loadPreview(currentGid);
}

function renderMessages() {
  const area = document.getElementById('msgsArea');
  if (!area) return;
  const atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
  if (!messages.length) { area.innerHTML = '<div class="sys-msg">Nog geen berichten 🎉</div>'; return; }
  
  let html = '';
  messages.forEach(function(m) {
    const own = m.user_id === currentUserId;
    const c = palette(m.username);
    const replyContent = m.reply_to ? '<div class="msg-reply">↳ ' + esc(messages.find(x => x.id === m.reply_to)?.content?.slice(0,30) || 'Bericht') + '</div>' : '';
    const content = m.image
      ? '<img class="msg-img" src="' + m.image + '" alt="foto" data-msg-id="' + m.id + '">'
      : '<div class="msg-bubble' + (m.reply_to ? ' reply-bubble' : '') + '">' + esc(m.content) + '</div>';
    
    let reactions = '';
    if (m.reactions) {
      const reactionCounts = {};
      m.reactions.forEach(r => {
        if (!reactionCounts[r.emoji]) reactionCounts[r.emoji] = { count: 0, users: [] };
        reactionCounts[r.emoji].count++;
        if (r.user_id === currentUserId) reactionCounts[r.emoji].active = true;
      });
      reactions = '<div class="msg-reactions">';
      Object.entries(reactionCounts).forEach(([emoji, data]) => {
        reactions += '<div class="reaction' + (data.active ? ' active' : '') + '" data-msg-id="' + m.id + '" data-emoji="' + emoji + '">' + emoji + ' ' + data.count + '</div>';
      });
      reactions += '</div>';
    }

    html +=
      '<div class="msg-row' + (own?' own':'') + '" data-msg-id="' + m.id + '">' +
        '<div class="msg-av" style="background:' + c[0] + ';color:' + c[1] + '">' + esc(initials(m.username)) + '</div>' +
        '<div class="msg-body">' +
          '<div class="msg-sender">' + (own?'Jij':esc(m.username)) + '</div>' +
          replyContent +
          content +
          '<div class="msg-time">' + new Date(m.created_at).toLocaleTimeString('nl-BE', {hour:'2-digit',minute:'2-digit'}) + '</div>' +
          reactions +
          (own ? '<div class="msg-actions"><span class="msg-action-btn" data-action="reply" data-msg-id="' + m.id + '">↩️</span><span class="msg-action-btn" data-action="react" data-msg-id="' + m.id + '">😊</span><span class="msg-action-btn" data-action="delete" data-msg-id="' + m.id + '">🗑️</span></div>' : '') +
        '</div>' +
      '</div>';
  });
  area.innerHTML = html;

  area.querySelectorAll('.msg-img').forEach(img => {
    img.addEventListener('click', function() {
      const lb = document.createElement('div');
      lb.className = 'lightbox';
      lb.innerHTML = '<img src="' + img.src + '">';
      lb.addEventListener('click', () => lb.remove());
      document.body.appendChild(lb);
    });
  });

  area.querySelectorAll('.msg-action-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const action = this.dataset.action;
      const msgId = this.dataset.msgId;
      if (action === 'reply') showReply(msgId);
      else if (action === 'react') showReactionPicker(msgId);
      else if (action === 'delete') deleteMessage(msgId);
    });
  });

  area.querySelectorAll('.reaction').forEach(r => {
    r.addEventListener('click', function() {
      const msgId = this.dataset.msgId;
      const emoji = this.dataset.emoji;
      addReaction(msgId, emoji);
    });
  });

  if (atBottom) area.scrollTop = area.scrollHeight;
}

function showReply(msgId) {
  const msg = messages.find(m => m.id === msgId);
  if (!msg) return;
  replyingTo = msgId;
  const inp = document.getElementById('msgInp');
  const wrap = inp.parentElement;
  const replyBar = document.createElement('div');
  replyBar.id = 'replyBar';
  replyBar.style.cssText = 'padding: 8px 14px; border-left: 3px solid #4f7fff; background: rgba(79,127,255,0.1); display: flex; justify-content: space-between; align-items: center; font-size: 12px;';
  replyBar.innerHTML = '↳ Antwoord op: <strong>' + esc(msg.username) + '</strong><button style="background: none; border: none; cursor: pointer; color: #5c6280;">×</button>';
  wrap.insertBefore(replyBar, wrap.firstChild);
  replyBar.querySelector('button').addEventListener('click', () => { replyingTo = null; replyBar.remove(); });
  inp.focus();
}

function showReactionPicker(msgId) {
  const area = document.getElementById('msgsArea');
  const msgRow = area.querySelector('[data-msg-id="' + msgId + '"]');
  const picker = document.createElement('div');
  picker.style.cssText = 'position: absolute; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 8px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; z-index: 100;';
  EMOJIS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.textContent = emoji;
    btn.style.cssText = 'background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; cursor: pointer; padding: 4px; font-size: 16px;';
    btn.addEventListener('click', () => { addReaction(msgId, emoji); picker.remove(); });
    picker.appendChild(btn);
  });
  msgRow.appendChild(picker);
}

async function addReaction(msgId, emoji) {
  const msg = messages.find(m => m.id === msgId);
  if (!msg) return;
  
  let reactions = msg.reactions || [];
  const existing = reactions.find(r => r.user_id === currentUserId && r.emoji === emoji);
  
  if (existing) {
    reactions = reactions.filter(r => !(r.user_id === currentUserId && r.emoji === emoji));
  } else {
    reactions.push({ emoji, user_id: currentUserId, username: me });
  }
  
  await supabase.from('messages').update({ reactions }).eq('id', msgId);
  await loadMessages();
}

async function deleteMessage(msgId) {
  if (confirm('Bericht verwijderen?')) {
    await supabase.from('messages').delete().eq('id', msgId);
    await loadMessages();
  }
}

function handlePaste(e) {
  if (!currentGid) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (let i=0; i<items.length; i++) {
    if (items[i].type.startsWith('image/')) { const f=items[i].getAsFile(); if(f) processImg(f); break; }
  }
}

function processImg(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const max = 900;
      let w=img.width, h=img.height;
      if (w>max||h>max) { if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const pendingImg = canvas.toDataURL('image/jpeg', 0.82);
      renderImgPreview(pendingImg);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderImgPreview(src) {
  const bar = document.getElementById('imgPreviewBar');
  if (!bar) return;
  bar.innerHTML = '<div class="img-preview-bar"><img class="img-preview-thumb" src="' + src + '"><button class="img-preview-remove" id="removeImg">×</button></div>';
  document.getElementById('removeImg').addEventListener('click', () => { bar.innerHTML=''; });
  document.getElementById('sendBtn').dataset.pendingImg = src;
}

async function sendMsg() {
  const inp = document.getElementById('msgInp');
  if (!inp || !currentGid) return;
  const text = inp.value.trim();
  const pendingImg = document.getElementById('sendBtn').dataset.pendingImg;
  if (!text && !pendingImg) return;

  const now = Date.now();
  const timeDiff = now - lastMessageTime;
  if (timeDiff < 500) { alert('⏱️ Wacht een moment tussen berichten'); return; }
  lastMessageTime = now;

  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('imgPreviewBar').innerHTML = '';
  delete document.getElementById('sendBtn').dataset.pendingImg;

  const msg = {
    group_id: currentGid,
    user_id: currentUserId,
    username: me,
    content: text || null,
    image: pendingImg || null,
    reply_to: replyingTo,
    created_at: new Date().toISOString(),
    reactions: []
  };

  await supabase.from('messages').insert([msg]);
  replyingTo = null;
  document.getElementById('replyBar')?.remove();
  await loadMessages();
}

async function loadMembers() {
  const { data } = await supabase.from('group_members').select('*').eq('group_id', currentGid);
  members = data || [];
  renderMembers();
}

function renderMembers() {
  const list = document.getElementById('membersList');
  const isAdmin = currentGroup?.creator_id === currentUserId;
  list.innerHTML = members.map(m => {
    const isCreator = m.user_id === currentGroup?.creator_id;
    return '<div class="member-item">' +
      '<div><span class="member-name">' + esc(m.username) + '</span>' + (isCreator ? ' <span class="member-badge">👑 Admin</span>' : '') + '</div>' +
      (isAdmin && !isCreator ? '<button class="member-action-btn" data-user-id="' + m.user_id + '">Eruit</button>' : '') +
    '</div>';
  }).join('');

  list.querySelectorAll('.member-action-btn').forEach(btn => {
    btn.addEventListener('click', async function() {
      const userId = this.dataset.userId;
      if (confirm('Lid verwijderen?')) {
        await supabase.from('group_members').delete().eq('user_id', userId).eq('group_id', currentGid);
        await loadMembers();
      }
    });
  });
}

function showGroupSettings() {
  const ov = openModal(
    '<h3>Groepsinstellingen</h3>' +
    '<label>Groepsnaam</label>' +
    '<input class="modal-input" id="settingName" value="' + esc(currentGroup.name) + '">' +
    '<label>Beschrijving</label>' +
    '<textarea class="modal-textarea" id="settingDesc">' + esc(currentGroup.description || '') + '</textarea>' +
    '<div class="modal-btns">' +
      '<button class="btn-cancel" id="settingCancel">Annuleren</button>' +
      '<button class="btn-confirm" id="settingSave">Opslaan</button>' +
    '</div>'
  );

  ov.querySelector('#settingSave').addEventListener('click', async function() {
    const name = ov.querySelector('#settingName').value.trim();
    const desc = ov.querySelector('#settingDesc').value.trim();
    if (!name) return;
    await supabase.from('groups').update({ name, description: desc }).eq('id', currentGid);
    currentGroup.name = name;
    currentGroup.description = desc;
    ov.remove();
    renderChat(currentGroup);
    loadGroups();
  });

  ov.querySelector('#settingCancel').addEventListener('click', () => ov.remove());
}

function showShare(group) {
  const ov = openModal(
    '<h3>Groep delen</h3>' +
    '<p style="font-size:13px;color:#9198b0;margin-bottom:10px;">Groeps-ID</p>' +
    '<div class="share-id-box">' + esc(group.id) + '</div>' +
    '<button class="btn-confirm" id="copyBtn" style="width: 100%;">Kopieer</button>'
  );

  ov.querySelector('#copyBtn').addEventListener('click', function() {
    navigator.clipboard.writeText(group.id);
    this.textContent = '✓ Gekopieerd!';
    setTimeout(() => { this.textContent = 'Kopieer'; }, 2000);
  });
}

function palette(name) {
  let h=0;
  for(const c of name) h=(h*31+c.charCodeAt(0))&0xFFFF;
  const PALETTES = [
    ['#1a3a5c','#5ba3f5'], ['#1a3a2e','#4ecfa0'], ['#3a1a2e','#d47fc9'],
    ['#3a2a1a','#e89a5a'], ['#2a1a3a','#9a7ff5'], ['#1a2a3a','#5ab5e8'],
  ];
  return PALETTES[h%PALETTES.length];
}

function initials(n) {
  return n.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('newGroupBtn').addEventListener('click', showNewGroup);
document.getElementById('joinGroupBtn').addEventListener('click', showJoinGroup);
document.getElementById('emptyBtn').addEventListener('click', showNewGroup);

document.getElementById('themeBtn').addEventListener('click', function() {
  const current = localStorage.getItem('theme') || 'dark';
  const themes = THEMES.map(t => t.name.toLowerCase());
  const idx = (themes.indexOf(current) + 1) % themes.length;
  const theme = THEMES[idx];
  localStorage.setItem('theme', theme.name.toLowerCase());
  applyTheme(theme);
  document.body.classList.toggle('light-mode', theme.name === 'Light');
});

document.getElementById('userFooter').addEventListener('click', function() {
  const ov = openModal(
    '<h3>Gebruikersnaam wijzigen</h3>' +
    '<input class="modal-input" id="renInp" type="text" value="' + esc(me||'') + '" maxlength="24">' +
    '<div class="modal-btns"><button class="btn-cancel" id="renCancel">Annuleren</button><button class="btn-confirm" id="renOk">Opslaan</button></div>'
  );
  const inp = ov.querySelector('#renInp');
  function go() {
    const v = inp.value.trim();
    if(!v) { inp.focus(); return; }
    me = v;
    localStorage.setItem('chat_un', v);
    ov.remove();
    updateFooter();
  }
  ov.querySelector('#renOk').addEventListener('click', go);
  ov.querySelector('#renCancel').addEventListener('click', () => ov.remove());
  inp.select();
  inp.focus();
});

function applyTheme(theme) {
  const root = document.documentElement;
  Object.entries(theme.colors).forEach(([key, value]) => {
    root.style.setProperty('--' + key, value);
  });
}

updateFooter();
const savedTheme = localStorage.getItem('theme') || 'dark';
const theme = THEMES.find(t => t.name.toLowerCase() === savedTheme) || THEMES[0];
applyTheme(theme);
if (theme.name === 'Light') document.body.classList.add('light-mode');
loadGroups();
</script>
